<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}

  <script>
    var prevSkin = localStorage.getItem("minima-ss") || "style.css";
    var stylesheetUrl = "{{ '/assets/css/' | relative_url }}" + prevSkin;
    document.write('<link id="main-stylesheet" rel="stylesheet" href="' + stylesheetUrl + '">');
  </script>
  <noscript>
    <link id="main-stylesheet" rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </noscript>

  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var links = document.querySelectorAll("a[href]");
      links.forEach(function (link) {
        var href = link.getAttribute("href");
        if (
          href &&
          /^https?:\/\//i.test(href) &&
          !href.startsWith(window.location.origin)
        ) {
          link.setAttribute("target", "_blank");
          link.setAttribute("rel", "noopener noreferrer");
        }
      });
    });
  </script>
</head>
